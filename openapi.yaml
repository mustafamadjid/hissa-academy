        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        channel_title:
          type: string
          nullable: true
        thumbnail_url:
          type: string
          format: uri
          nullable: true
        duration_iso:
          type: string
          nullable: true
        duration_seconds:
          type: integer
          nullable: true
        privacy_status:
          type: string
          nullable: true
