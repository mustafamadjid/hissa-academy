          nullable: true
          allOf:
            - $ref: "#/components/schemas/LessonVideo"
    UpsertLessonVideoRequest:
      type: object
      required: [youtube_video_id]
      additionalProperties: false
      properties:
        youtube_video_id:
          type: string
          pattern: "^[A-Za-z0-9_-]{6,20}$"
          example: dQw4w9WgXcQ
    LessonVideo:
      type: object
      required: [id, lesson_id, youtube_video_id, video_url]
