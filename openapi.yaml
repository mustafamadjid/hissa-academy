openapi: 3.0.3
info:
  title: HISSA Academy API
  version: "1.1.0"
  description: |
    Kontrak HTTP HISSA Academy yang disinkronkan dengan implementasi Laravel.
    Endpoint privat menerima autentikasi Laravel Sanctum melalui session cookie
    untuk SPA stateful atau bearer token Sanctum. Semua identifier domain yang
    diekspos backend berbentuk UUID.
servers:
  - url: /
    description: Application root
tags:
  - name: Authentication
  - name: Student Courses
  - name: Student Lessons
  - name: Student Quiz
  - name: Student Certificates
  - name: Public Verification
  - name: Admin Courses
  - name: Admin Lessons
  - name: Admin Quiz
  - name: Admin Students
  - name: Admin Certificates

paths:
  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login berhasil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "422":
          description: Kredensial salah atau request tidak lolos validasi.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MessageResponse"
                  - $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      summary: Logout
      security: []
      responses:
        "200":
          description: Logout berhasil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Logout berhasil.
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/auth/me:
    get:
      tags: [Authentication]
      summary: Get current user
      responses:
        "200":
          description: Profil user terautentikasi beserta role untuk otorisasi frontend.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api/v1/auth/google/redirect:
    get:
      tags: [Authentication]
      summary: Google OAuth redirect
      security: []
      responses:
        "302":
          description: Redirect ke halaman autentikasi Google.
          headers:
            Location:
              description: URL autentikasi Google.
              schema:
                type: string
                format: uri

  /api/v1/auth/google/callback:
    get:
      tags: [Authentication]
      summary: Google OAuth callback
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect ke `/auth/callback` pada frontend setelah autentikasi berhasil.
          headers:
            Location:
              description: URL callback frontend.
              schema:
                type: string
                format: uri

  /api/v1/courses:
    get:
      tags: [Student Courses]
      summary: Get published courses
      security: []
      description: |
        Mengambil daftar course yang dipublikasikan untuk student.
        
        Endpoint mendukung pencarian pada `name` dan `description`, sorting,
        serta pagination berbasis `page` dan `limit`.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: Pencarian berdasarkan nama course atau deskripsi.
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [name, minimum_score, created_at, updated_at]
            default: created_at
          description: Kolom yang digunakan untuk mengurutkan data.
        - name: sort_direction
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Arah pengurutan data.
      responses:
        "200":
          description: Daftar course berhasil diambil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentCourseListResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/courses/{course_uuid}:
    get:
      tags: [Student Courses]
      summary: Get course detail
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      responses:
        "200":
          description: Detail course berhasil diambil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentCourseDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/CourseNotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/courses/{course_uuid}/progress:
    get:
      tags: [Student Courses]
      summary: Get course progress
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      responses:
        "200":
          description: Progress course berhasil diambil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseProgressResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/CourseNotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/lessons/{lesson_uuid}:
    get:
      tags: [Student Lessons]
      summary: Get lesson detail
      parameters:
        - $ref: "#/components/parameters/LessonUuid"
      responses:
        "200":
          description: Detail lesson berhasil diambil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentLessonResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/LessonLocked"
        "404":
          $ref: "#/components/responses/LessonNotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/lessons/{lesson_uuid}/progress:
    get:
      tags: [Student Lessons]
      summary: Get lesson progress
      parameters:
        - $ref: "#/components/parameters/LessonUuid"
      responses:
        "200":
          description: Progress lesson berhasil diambil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgressResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/LessonNotFound"
        "500":
          $ref: "#/components/responses/ServerError"
    post:
      tags: [Student Lessons]
      summary: Submit progress heartbeat
      parameters:
        - $ref: "#/components/parameters/LessonUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressHeartbeatRequest"
      responses:
        "200":
          description: Progress lesson berhasil disimpan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgressResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/LessonNotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/ServerError"

   /api/v1/courses/{course_uuid}/quiz/access:
     get:
       tags: [Student Quiz]
       summary: Check quiz access permission
       parameters:
         - $ref: "#/components/parameters/CourseUuid"
       responses:
         "200":
           description: Access check berhasil diproses.
           content:
             application/json:
               schema:
                 allOf:
                   - $ref: "#/components/schemas/SuccessResponse"
                   - type: object
                     properties:
                       data:
                         type: object
                         properties:
                           course_uuid:
                             type: string
                             format: uuid
                           quiz_uuid:
                             type: string
                             format: uuid
                           can_access:
                             type: boolean
                           required_lessons:
                             type: integer
                             minimum: 0
                           completed_required_lessons:
                             type: integer
                             minimum: 0
                           reason:
                             type: string
                             nullable: true
                         required:
                           - course_uuid
                           - quiz_uuid
                           - can_access
                           - required_lessons
                           - completed_required_lessons
                           - reason
         "401":
           $ref: "#/components/responses/Unauthenticated"
         "403":
           $ref: "#/components/responses/Forbidden"
         "404":
           $ref: "#/components/responses/QuizNotFound"
         "500":
           $ref: "#/components/responses/ServerError"

   /api/v1/courses/{course_uuid}/quiz:
     get:
       tags: [Student Quiz]
       summary: Get course quiz
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      responses:
        "200":
          description: Quiz berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StudentQuiz"
        "403":
          $ref: "#/components/responses/QuizLocked"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/QuizNotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/quizzes/{quiz_uuid}/attempts:
    post:
      tags: [Student Quiz]
      summary: Create quiz attempt
      parameters:
        - $ref: "#/components/parameters/QuizUuid"
      responses:
        "201":
          description: Quiz attempt berhasil dibuat.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/QuizAttempt"
        "409":
          $ref: "#/components/responses/ActiveAttemptExists"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/QuizNotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/quiz-attempts/{attempt_uuid}:
    get:
      tags: [Student Quiz]
      summary: Get quiz attempt
      parameters:
        - $ref: "#/components/parameters/AttemptUuid"
      responses:
        "200":
          description: Quiz attempt berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/QuizAttemptWithAnswers"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/QuizAttemptNotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/quiz-attempts/{attempt_uuid}/submit:
    post:
      tags: [Student Quiz]
      summary: Submit quiz attempt
      parameters:
        - $ref: "#/components/parameters/AttemptUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitQuizAttemptRequest"
      responses:
        "200":
          description: Quiz berhasil disubmit.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/QuizSubmitResult"
        "409":
          $ref: "#/components/responses/AttemptAlreadySubmitted"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/QuizAttemptNotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/certificates:
    get:
      tags: [Student Certificates]
      summary: Get user certificates
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Daftar sertifikat berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/CertificateSummary"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/certificates/{certificate_uuid}:
    get:
      tags: [Student Certificates]
      summary: Get certificate detail
      parameters:
        - $ref: "#/components/parameters/CertificateUuid"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Detail sertifikat berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CertificateDetail"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/CertificateNotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/certificates/{certificate_uuid}/download:
    get:
      tags: [Student Certificates]
      summary: Download certificate PDF
      parameters:
        - $ref: "#/components/parameters/CertificateUuid"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Binary PDF certificate.
          headers:
            Content-Disposition:
              schema:
                type: string
              example: attachment; filename="HISSA-2026-X7KD9Q2M.pdf"
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/CertificateFileNotFound"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/ServerError"

  /verify/{certificate_number}:
    get:
      tags: [Public Verification]
      summary: Verification page
      security: []
      parameters:
        - $ref: "#/components/parameters/CertificateNumber"
      responses:
        "200":
          description: Halaman web publik hasil verifikasi sertifikat.
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Halaman HTML sertifikat tidak ditemukan.
          content:
            text/html:
              schema:
                type: string

  /api/v1/public/certificates/{certificate_number}:
    get:
      tags: [Public Verification]
      summary: Verify certificate API
      security: []
      parameters:
        - $ref: "#/components/parameters/CertificateNumber"
      responses:
        "200":
          description: Sertifikat valid atau revoked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PublicCertificateVerification"
        "404":
          $ref: "#/components/responses/CertificateNotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/admin/courses:
    get:
      tags: [Admin Courses]
      summary: Get admin courses
      description: |
        Mengambil daftar course untuk admin.

        Endpoint mendukung pencarian pada `course_name` dan `description`, sorting,
        serta pagination berbasis `page` dan `limit`.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/AdminCourseLimit"
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: Pencarian berdasarkan nama course atau deskripsi.
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [course_name, minimum_score, status, created_at, updated_at]
            default: created_at
          description: Kolom yang digunakan untuk mengurutkan data.
        - name: sort_direction
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Arah pengurutan data.
      responses:
        "200":
          description: Daftar course admin berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AdminCourse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/AdminCourseOperationFailed"
    post:
      tags: [Admin Courses]
      summary: Create course
      description: Membuat course baru untuk katalog pembelajaran.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "201":
          description: Course berhasil dibuat.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminCourse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/AdminCourseOperationFailed"

  /api/v1/admin/courses/{course_uuid}:
    get:
      tags: [Admin Courses]
      summary: Get admin course detail
      description: Mengambil detail course admin beserta jumlah dan daftar lesson berdasarkan UUID course.
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      responses:
        "200":
          description: Detail course admin berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminCourseDetail"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/AdminCourseNotFound"
        "500":
          $ref: "#/components/responses/AdminCourseOperationFailed"
    patch:
      tags: [Admin Courses]
      summary: Update course
      description: |
        Memperbarui sebagian data course. Field yang dikirim harus valid,
        sedangkan field yang tidak dikirim tidak berubah.
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
      responses:
        "200":
          description: Course berhasil diperbarui.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminCourse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/AdminCourseNotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/AdminCourseOperationFailed"
    delete:
      tags: [Admin Courses]
      summary: Delete course
      description: Menghapus course berdasarkan UUID. Response sukses tidak mengembalikan data course.
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      responses:
        "200":
          description: Course berhasil dihapus.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCourseResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/AdminCourseNotFound"
        "500":
          $ref: "#/components/responses/AdminCourseOperationFailed"

  /api/v1/admin/courses/{course_uuid}/lessons:
    get:
      tags: [Admin Lessons]
      summary: Get course lessons
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      responses:
        "200":
          description: Daftar lesson berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AdminLesson"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/AdminCourseNotFound"
        "500":
          $ref: "#/components/responses/AdminLessonOperationFailed"
    post:
      tags: [Admin Lessons]
      summary: Create lesson
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonRequest"
      responses:
        "201":
          description: Lesson berhasil dibuat.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminLesson"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/AdminForbidden"
        "404":
          $ref: "#/components/responses/AdminCourseNotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/AdminLessonOperationFailed"

  /api/v1/admin/courses/{courseId}/lessons/reorder:
    patch:
      tags: [Admin Lessons]
      summary: Reorder course lessons
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderLessonsRequest"
      responses:
        "200":
          description: Lesson berhasil diurutkan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleSuccessResponse"
              example:
                success: true
                message: Lesson berhasil diurutkan.
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/AdminForbidden"
        "404":
          $ref: "#/components/responses/AdminLessonNotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/AdminLessonOperationFailed"

  /api/v1/admin/lessons/{lesson_uuid}:
    get:
      tags: [Admin Lessons]
      summary: Get lesson detail
      parameters:
        - $ref: "#/components/parameters/LessonUuid"
      responses:
        "200":
          description: Detail lesson berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
