                  type: string
                  format: uuid
                full_name:
                  type: string
                email:
                  type: string
                  format: email
    RevokeCertificateRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        reason:
          type: string
          example: Sertifikat diterbitkan berdasarkan data yang tidak valid.
    RevokedCertificate:
      type: object
      required: [uuid, certificate_number, status, revoked_at, revocation_reason]
