openapi: 3.0.3
info:
  title: HISSA Academy API
  version: "1.0"
  description: |
    OpenAPI documentation generated from api.md.

    Semua endpoint privat menggunakan public UUID. Numeric primary key tidak diekspos ke client.
servers:
  - url: /
    description: Application root
tags:
  - name: Authentication
  - name: Student Courses
  - name: Student Lessons
  - name: Student Quiz
  - name: Student Certificates
  - name: Public Verification
  - name: Admin Courses
  - name: Admin Lessons
  - name: Admin Quiz
  - name: Admin Certificates

paths:
  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login berhasil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      summary: Logout
      responses:
        "204":
          description: Logout berhasil tanpa response body.
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api/v1/auth/me:
    get:
      tags: [Authentication]
      summary: Get current user
      responses:
        "200":
          description: Profil user berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /auth/google/redirect:
    get:
      tags: [Authentication]
      summary: Google OAuth redirect
      security: []
      responses:
        "302":
          description: Redirect ke halaman autentikasi Google.

  /auth/google/callback:
    get:
      tags: [Authentication]
      summary: Google OAuth callback
      security: []
      responses:
        "302":
          description: Redirect ke frontend setelah autentikasi berhasil atau gagal.

  /api/v1/courses:
    get:
      tags: [Student Courses]
      summary: Get published courses
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Pencarian nama course.
      responses:
        "200":
          description: Daftar course berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/CourseSummary"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/courses/{course_uuid}:
    get:
      tags: [Student Courses]
      summary: Get course detail
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      responses:
        "200":
          description: Detail course berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CourseDetail"
        "404":
          $ref: "#/components/responses/CourseNotFound"

  /api/v1/courses/{course_uuid}/progress:
    get:
      tags: [Student Courses]
      summary: Get course progress
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      responses:
        "200":
          description: Progress course berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CourseProgressDetail"

  /api/v1/lessons/{lesson_uuid}:
    get:
      tags: [Student Lessons]
      summary: Get lesson detail
      parameters:
        - $ref: "#/components/parameters/LessonUuid"
      responses:
        "200":
          description: Detail lesson berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LessonDetail"
        "403":
          $ref: "#/components/responses/LessonLocked"
        "404":
          $ref: "#/components/responses/LessonNotFound"

  /api/v1/lessons/{lesson_uuid}/progress:
    get:
      tags: [Student Lessons]
      summary: Get lesson progress
      parameters:
        - $ref: "#/components/parameters/LessonUuid"
      responses:
        "200":
          description: Progress lesson berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LessonProgress"
    post:
      tags: [Student Lessons]
      summary: Submit progress heartbeat
      parameters:
        - $ref: "#/components/parameters/LessonUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressHeartbeatRequest"
      responses:
        "200":
          description: Progress berhasil diperbarui.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LessonProgressUpdate"
        "422":
          $ref: "#/components/responses/InvalidProgressHeartbeat"
        "429":
          $ref: "#/components/responses/ProgressRateLimited"

  /api/v1/courses/{course_uuid}/quiz:
    get:
      tags: [Student Quiz]
      summary: Get course quiz
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      responses:
        "200":
          description: Quiz berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StudentQuiz"
        "403":
          $ref: "#/components/responses/QuizLocked"

  /api/v1/quizzes/{quiz_uuid}/attempts:
    post:
      tags: [Student Quiz]
      summary: Create quiz attempt
      parameters:
        - $ref: "#/components/parameters/QuizUuid"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "201":
          description: Quiz attempt berhasil dibuat.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/QuizAttempt"
        "409":
          $ref: "#/components/responses/ActiveAttemptExists"

  /api/v1/quiz-attempts/{attempt_uuid}:
    get:
      tags: [Student Quiz]
      summary: Get quiz attempt
      parameters:
        - $ref: "#/components/parameters/AttemptUuid"
      responses:
        "200":
          description: Quiz attempt berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/QuizAttemptWithAnswers"

  /api/v1/quiz-attempts/{attempt_uuid}/submit:
    post:
      tags: [Student Quiz]
      summary: Submit quiz attempt
      parameters:
        - $ref: "#/components/parameters/AttemptUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitQuizAttemptRequest"
      responses:
        "200":
          description: Quiz berhasil disubmit.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/QuizSubmitResult"
        "409":
          $ref: "#/components/responses/AttemptAlreadySubmitted"

  /api/v1/certificates:
    get:
      tags: [Student Certificates]
      summary: Get user certificates
      responses:
        "200":
          description: Daftar sertifikat berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/CertificateSummary"

  /api/v1/certificates/{certificate_uuid}:
    get:
      tags: [Student Certificates]
      summary: Get certificate detail
      parameters:
        - $ref: "#/components/parameters/CertificateUuid"
      responses:
        "200":
          description: Detail sertifikat berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CertificateDetail"

  /api/v1/certificates/{certificate_uuid}/download:
    get:
      tags: [Student Certificates]
      summary: Download certificate PDF
      parameters:
        - $ref: "#/components/parameters/CertificateUuid"
      responses:
        "200":
          description: Binary PDF certificate.
          headers:
            Content-Disposition:
              schema:
                type: string
              example: attachment; filename="HISSA-2026-X7KD9Q2M.pdf"
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/CertificateFileNotFound"

  /verify/{certificate_number}:
    get:
      tags: [Public Verification]
      summary: Verification page
      security: []
      parameters:
        - $ref: "#/components/parameters/CertificateNumber"
      responses:
        "200":
          description: Halaman web publik hasil verifikasi sertifikat.
          content:
            text/html:
              schema:
                type: string

  /api/v1/public/certificates/{certificate_number}:
    get:
      tags: [Public Verification]
      summary: Verify certificate API
      security: []
      parameters:
        - $ref: "#/components/parameters/CertificateNumber"
      responses:
        "200":
          description: Sertifikat valid atau revoked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PublicCertificateVerification"
        "404":
          $ref: "#/components/responses/CertificateNotFound"

  /api/v1/admin/courses:
    get:
      tags: [Admin Courses]
      summary: Get admin courses
      description: |
        Mengambil daftar course untuk admin.

        Endpoint mendukung pencarian pada `course_name` dan `description`, sorting,
        serta pagination berbasis `page` dan `limit`.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/AdminCourseLimit"
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: Pencarian berdasarkan nama course atau deskripsi.
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [course_name, minimum_score, status, created_at, updated_at]
            default: created_at
          description: Kolom yang digunakan untuk mengurutkan data.
        - name: sort_direction
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Arah pengurutan data.
      responses:
        "200":
          description: Daftar course admin berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AdminCourse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/AdminCourseOperationFailed"
    post:
      tags: [Admin Courses]
      summary: Create course
      description: Membuat course baru untuk katalog pembelajaran.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "201":
          description: Course berhasil dibuat.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminCourse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/AdminCourseOperationFailed"

  /api/v1/admin/courses/{course_uuid}:
    get:
      tags: [Admin Courses]
      summary: Get admin course detail
      description: Mengambil detail course admin berdasarkan UUID course.
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      responses:
        "200":
          description: Detail course admin berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminCourse"
        "404":
          $ref: "#/components/responses/AdminCourseNotFound"
        "500":
          $ref: "#/components/responses/AdminCourseOperationFailed"
    patch:
      tags: [Admin Courses]
      summary: Update course
      description: |
        Memperbarui sebagian data course. Field yang dikirim harus valid,
        sedangkan field yang tidak dikirim tidak berubah.
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
      responses:
        "200":
          description: Course berhasil diperbarui.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminCourse"
        "404":
          $ref: "#/components/responses/AdminCourseNotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/AdminCourseOperationFailed"
    delete:
      tags: [Admin Courses]
      summary: Delete course
      description: Menghapus course berdasarkan UUID. Response sukses tidak mengembalikan data course.
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      responses:
        "200":
          description: Course berhasil dihapus.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCourseResponse"
        "404":
          $ref: "#/components/responses/AdminCourseNotFound"
        "500":
          $ref: "#/components/responses/AdminCourseOperationFailed"

  /api/v1/admin/courses/{course_uuid}/lessons:
    post:
      tags: [Admin Lessons]
      summary: Create lesson
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonRequest"
      responses:
        "201":
          description: Lesson berhasil dibuat.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminLesson"
        "409":
          $ref: "#/components/responses/LessonPositionConflict"

  /api/v1/admin/lessons/{lesson_uuid}:
    patch:
      tags: [Admin Lessons]
      summary: Update lesson
      parameters:
        - $ref: "#/components/parameters/LessonUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLessonRequest"
      responses:
        "200":
          description: Lesson berhasil diperbarui.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminLesson"
    delete:
      tags: [Admin Lessons]
      summary: Delete lesson
      parameters:
        - $ref: "#/components/parameters/LessonUuid"
      responses:
        "204":
          description: Lesson berhasil dihapus tanpa response body.
        "409":
          $ref: "#/components/responses/LessonHasDependencies"

  /api/v1/admin/lessons/{lesson_uuid}/video:
    put:
      tags: [Admin Lessons]
      summary: Create or update lesson video
      parameters:
        - $ref: "#/components/parameters/LessonUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertLessonVideoRequest"
      responses:
        "200":
          description: Video lesson berhasil disimpan.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LessonVideo"
        "422":
          $ref: "#/components/responses/InvalidYoutubeVideo"

  /api/v1/admin/courses/{course_uuid}/quiz:
    put:
      tags: [Admin Quiz]
      summary: Create or update course quiz
      parameters:
        - $ref: "#/components/parameters/CourseUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertQuizRequest"
      responses:
        "200":
          description: Quiz berhasil disimpan.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminQuiz"

  /api/v1/admin/quizzes/{quiz_uuid}/questions:
    post:
      tags: [Admin Quiz]
      summary: Create quiz question
      parameters:
        - $ref: "#/components/parameters/QuizUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuizQuestionRequest"
      responses:
        "201":
          description: Pertanyaan quiz berhasil dibuat.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminQuizQuestion"

  /api/v1/admin/quiz-questions/{question_uuid}:
    patch:
      tags: [Admin Quiz]
      summary: Update quiz question
      parameters:
        - $ref: "#/components/parameters/QuestionUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuizQuestionRequest"
      responses:
        "200":
          description: Pertanyaan quiz berhasil diperbarui.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminQuizQuestion"
    delete:
      tags: [Admin Quiz]
      summary: Delete quiz question
      parameters:
        - $ref: "#/components/parameters/QuestionUuid"
      responses:
        "204":
          description: Pertanyaan quiz berhasil dihapus tanpa response body.

  /api/v1/admin/certificates:
    get:
      tags: [Admin Certificates]
      summary: Get certificates
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [valid, revoked]
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Nama user atau certificate number.
        - name: course_uuid
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Daftar sertifikat berhasil diambil.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AdminCertificateSummary"

  /api/v1/admin/certificates/{certificate_uuid}/revoke:
    patch:
      tags: [Admin Certificates]
      summary: Revoke certificate
      parameters:
        - $ref: "#/components/parameters/CertificateUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeCertificateRequest"
      responses:
        "200":
          description: Sertifikat berhasil dicabut.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RevokedCertificate"
        "409":
          $ref: "#/components/responses/CertificateAlreadyRevoked"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Halaman data.
    PerPage:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Jumlah data per halaman.
    AdminCourseLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Jumlah data course per halaman.
    CourseUuid:
      name: course_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LessonUuid:
      name: lesson_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuizUuid:
      name: quiz_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AttemptUuid:
      name: attempt_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CertificateUuid:
      name: certificate_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CertificateNumber:
      name: certificate_number
      in: path
      required: true
      schema:
        type: string
      example: HISSA-2026-X7KD9Q2M
    QuestionUuid:
      name: question_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthenticated:
      description: User belum terautentikasi.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: User belum login.
            error:
              code: UNAUTHENTICATED
              details: {}
    Forbidden:
      description: User tidak memiliki izin.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: User tidak memiliki izin.
            error:
              code: FORBIDDEN
              details: {}
    InvalidCredentials:
      description: Email atau password tidak valid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Email atau password tidak valid.
            error:
              code: INVALID_CREDENTIALS
              details: {}
    ValidationError:
      description: Data yang diberikan tidak valid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Data yang diberikan tidak valid.
            error:
              code: VALIDATION_ERROR
              details:
                email:
                  - Email wajib diisi.
    CourseNotFound:
      description: Course tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Course tidak ditemukan.
            error:
              code: COURSE_NOT_FOUND
              details: {}
    AdminCourseNotFound:
