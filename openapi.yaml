          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CreateQuizQuestionRequest"
    CreateQuizQuestionRequest:
      type: object
      required: [question, position, answers]
      additionalProperties: false
      properties:
        quizz_id:
          type: string
          format: uuid
