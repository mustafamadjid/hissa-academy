components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: Personal access token Laravel Sanctum.
    sanctumCookie:
      type: apiKey
      in: cookie
      name: laravel_session
      description: Session cookie untuk SPA stateful Laravel Sanctum.

  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Halaman data.
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Jumlah data per halaman.
    AdminCourseLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Jumlah data course per halaman.
    CourseUuid:
      name: course_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LessonUuid:
      name: lesson_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuizUuid:
      name: quiz_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AttemptUuid:
      name: attempt_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CertificateUuid:
      name: certificate_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CertificateNumber:
      name: certificate_number
      in: path
      required: true
      schema:
        type: string
      example: HISSA-2026-X7KD9Q2M
    QuestionUuid:
      name: question_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    StudentUuid:
      name: student_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthenticated:
      description: User belum terautentikasi.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"
          example:
            message: Unauthenticated.
    Forbidden:
      description: User tidak memiliki izin.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: User tidak memiliki izin.
    InvalidCredentials:
      description: Email atau password tidak valid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Email atau password tidak valid.
            error:
              code: INVALID_CREDENTIALS
              details: {}
    ValidationError:
      description: Data yang diberikan tidak valid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
          example:
            message: The email field is required.
            errors:
              email:
                - The email field is required.
    CourseNotFound:
      description: Course tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Course tidak ditemukan.
    AdminCourseNotFound:
      description: Course tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Course tidak ditemukan.
    AdminCourseOperationFailed:
      description: Operasi admin course gagal diproses oleh server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          examples:
            listFailed:
              summary: Gagal mengambil daftar course
              value:
                success: false
                message: Gagal mengambil daftar course.
            createFailed:
              summary: Gagal membuat course
              value:
                success: false
                message: Gagal membuat course.
            updateFailed:
              summary: Gagal memperbarui course
              value:
                success: false
                message: Gagal memperbarui course.
            deleteFailed:
              summary: Gagal menghapus course
              value:
                success: false
                message: Gagal menghapus course.
    AdminForbidden:
      description: User tidak memiliki izin untuk operasi admin ini.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: User tidak memiliki izin.
    AdminValidationError:
      description: Data yang diberikan tidak valid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: The given data was invalid.
    AdminLessonNotFound:
      description: Lesson tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Lesson tidak ditemukan.
    AdminLessonOperationFailed:
      description: Operasi admin lesson gagal diproses oleh server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          examples:
            listFailed:
              summary: Gagal mengambil daftar lesson
              value:
                success: false
                message: Gagal mengambil daftar lesson.
            createFailed:
              summary: Gagal membuat lesson
              value:
                success: false
                message: Gagal membuat lesson.
            detailFailed:
              summary: Gagal mengambil detail lesson
              value:
                success: false
                message: Gagal mengambil detail lesson.
            updateFailed:
              summary: Gagal memperbarui lesson
              value:
                success: false
                message: Gagal memperbarui lesson.
            deleteFailed:
              summary: Gagal menghapus lesson
              value:
                success: false
                message: Gagal menghapus lesson.
            reorderFailed:
              summary: Gagal mengurutkan lesson
              value:
                success: false
                message: Gagal mengurutkan lesson.
    AdminLessonVideoOperationFailed:
      description: Operasi admin lesson video gagal diproses oleh server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          examples:
            saveFailed:
              summary: Gagal menyimpan metadata video lesson
              value:
                success: false
                message: Gagal menyimpan metadata video lesson.
            deleteFailed:
              summary: Gagal menghapus metadata video lesson
              value:
                success: false
                message: Gagal menghapus metadata video lesson.
    LessonNotFound:
      description: Lesson tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Lesson tidak ditemukan.
    LessonLocked:
      description: Lesson masih terkunci.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Lesson masih terkunci.
    QuizLocked:
      description: Quiz belum dapat diakses.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Quiz belum dapat diakses.
            error:
              code: QUIZ_LOCKED
              details:
                reason: REQUIRED_LESSONS_NOT_COMPLETED
    ActiveAttemptExists:
      description: Masih terdapat quiz attempt yang aktif.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Masih terdapat quiz attempt yang aktif.
            error:
              code: ACTIVE_ATTEMPT_EXISTS
              details:
                attempt_uuid: 09e20716-852f-4dd0-860a-b59900aa3849
    AttemptAlreadySubmitted:
      description: Quiz attempt sudah pernah disubmit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Quiz attempt sudah pernah disubmit.
            error:
              code: ATTEMPT_ALREADY_SUBMITTED
              details: {}
    CertificateNotFound:
      description: Sertifikat tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Sertifikat tidak ditemukan.
    CertificateFileNotFound:
      description: File sertifikat tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Sertifikat tidak ditemukan.
    CertificateAlreadyRevoked:
      description: Sertifikat sudah dicabut sebelumnya.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Sertifikat sudah dicabut sebelumnya.
            error:
              code: CERTIFICATE_ALREADY_REVOKED
              details: {}
    LessonPositionConflict:
      description: Position lesson sudah digunakan pada course ini.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Position lesson sudah digunakan pada course ini.
            error:
              code: LESSON_POSITION_CONFLICT
              details:
                position: 1
    LessonHasDependencies:
      description: Lesson tidak dapat dihapus karena sudah memiliki data progress.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Lesson tidak dapat dihapus karena sudah memiliki data progress.
            error:
              code: LESSON_HAS_DEPENDENCIES
              details:
                dependencies:
                  - user_progress
    InvalidProgressHeartbeat:
      description: Data heartbeat tidak valid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Data heartbeat tidak valid.
            error:
              code: INVALID_PROGRESS_HEARTBEAT
              details:
                current_position_seconds:
                  - Posisi video tidak boleh melebihi durasi video.
    ProgressRateLimited:
      description: Heartbeat dikirim terlalu sering.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Heartbeat dikirim terlalu sering.
            error:
              code: PROGRESS_RATE_LIMITED
              details:
                retry_after_seconds: 3
    InvalidYoutubeVideo:
      description: Video YouTube tidak valid atau tidak dapat diakses.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Video YouTube tidak valid atau tidak dapat diakses.
            error:
              code: INVALID_YOUTUBE_VIDEO
              details:
                youtube_video_id:
                  - Video tidak ditemukan, bersifat private, atau tidak dapat di-embed.
    ServerError:
      description: Operasi gagal diproses oleh server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Terjadi kesalahan pada server.
    QuizNotFound:
      description: Quiz tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Quiz tidak ditemukan.
    QuizAttemptNotFound:
      description: Quiz attempt tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Quiz attempt tidak ditemukan.
    QuizOrCourseNotFound:
      description: Course atau final quiz tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
    QuestionNotFound:
      description: Pertanyaan quiz tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Pertanyaan quiz tidak ditemukan.
    QuizOrQuestionNotFound:
      description: Quiz atau pertanyaan quiz tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Quiz atau pertanyaan quiz tidak ditemukan.
    StudentNotFound:
      description: Student tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleErrorResponse"
          example:
            success: false
            message: Student tidak ditemukan.

  schemas:
    SuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Request berhasil diproses.
        data: {}
    PaginatedResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required: [meta]
          properties:
            data:
              type: array
              items: {}
            meta:
              $ref: "#/components/schemas/PaginationMeta"
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    ErrorResponse:
      type: object
      required: [success, message, error]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: object
          required: [code, details]
          properties:
            code:
              type: string
            details:
              type: object
              additionalProperties: true
    SimpleErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Course tidak ditemukan.
    SimpleSuccessResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Request berhasil diproses.
