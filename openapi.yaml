  schemas:
    SuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Request berhasil diproses.
        data: {}
    PaginatedResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required: [meta, links]
          properties:
            data:
              type: array
              items: {}
            meta:
              $ref: "#/components/schemas/PaginationMeta"
            links:
              $ref: "#/components/schemas/PaginationLinks"
    ErrorResponse:
      type: object
      required: [success, message, error]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: object
          required: [code, details]
          properties:
            code:
              type: string
            details:
              type: object
              additionalProperties: true
    SimpleErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Course tidak ditemukan.
    PaginationMeta:
      type: object
      required: [current_page, per_page, total, last_page]
      properties:
        current_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 15
        total:
          type: integer
          example: 100
        last_page:
          type: integer
          example: 7
    PaginationLinks:
      type: object
      required: [first, last, prev, next]
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: student@example.com
        password:
          type: string
          format: password
          example: secret123
    LoginResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              type: object
              required: [user]
              properties:
                user:
                  $ref: "#/components/schemas/User"
                token:
                  type: string
                  nullable: true
                  description: Dapat dihilangkan untuk Sanctum SPA berbasis cookie.
                  example: 1|example-sanctum-token
    User:
      type: object
      required: [uuid, username, email, phone, full_name, birth_date, avatar_url, role]
      properties:
        uuid:
          type: string
          format: uuid
        username:
          type: string
          example: student01
        email:
          type: string
          format: email
          example: student@example.com
        phone:
          type: string
          nullable: true
          example: "081234567890"
        full_name:
          type: string
          example: Student HISSA
        birth_date:
          type: string
          format: date
          nullable: true
          example: "2002-04-10"
        avatar_url:
          type: string
          format: uri
          nullable: true
        role:
          type: object
          required: [name]
          properties:
            name:
              type: string
              example: student
        last_login_at:
          type: string
          format: date-time
          nullable: true

